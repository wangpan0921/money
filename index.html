<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent 工坊 · 小应用集</title>
  <meta name="description" content="一个人 + 一个 Agent,在这间小工坊里做的小东西。" />
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --panel-2: #1c232c;
      --border: #2a3340;
      --border-strong: #3a4452;
      --text: #e6edf3;
      --muted: #8b949e;
      --primary: #2f81f7;
      --accent: #a371f7;
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 64px 24px 48px;
    }

    header.hero {
      margin-bottom: 48px;
    }
    header.hero h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    header.hero p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      max-width: 640px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      min-height: 200px;
    }

    .card:not(.placeholder):hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      background: var(--panel-2);
    }

    .card .icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .card h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      flex: 1;
    }

    .card .cta {
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      margin-top: 4px;
    }

    .card.placeholder {
      cursor: default;
      border-style: dashed;
      background: transparent;
    }
    .card.placeholder .icon {
      opacity: 0.5;
    }
    .card.placeholder h2,
    .card.placeholder p {
      color: var(--muted);
    }

    footer.foot {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 480px) {
      .page { padding: 40px 18px 32px; }
      header.hero h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>Agent 工坊</h1>
      <p>一个人 + 一个 Agent,在这间小工坊里做的小东西。每个格子是一个能用的小应用。</p>
    </header>

    <main class="grid">
      <a class="card" href="apps/income/">
        <div class="icon" aria-hidden="true">💰</div>
        <h2>我今年挣了多少钱</h2>
        <p>中国个税计算器。支持累计预扣预缴、专项附加扣除、年终奖最优计税、RSU/期权/ESPP。纯前端,数据不上传。</p>
        <span class="cta">打开 →</span>
      </a>

      <a class="card" href="apps/ypwd/">
        <div class="icon" aria-hidden="true">🔐</div>
        <h2>我的密码我自己管</h2>
        <p>Android 端的小密码管理器,APK 直接下载安装。版本 v1.0,体积 3.8 MB,支持 Android 14。</p>
        <span class="cta">打开 →</span>
      </a>
    </main>

    <footer class="foot">
      <span>© Agent 工坊</span>
      <span>由一个人和他的 Agent 共同打造</span>
    </footer>
  </div>
</body>
</html>
